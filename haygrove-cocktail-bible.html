<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haygrove Classic Cocktail Bible</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Helvetica+Neue:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F2E8;
    --bg-light: #EBE4DB;
    --text: #302C28;
    --text-muted: #71675D;
    --accent: #E7560D;
    --border: #BAAFA0;
    --white: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    height: 100%;
  }

  .bible-wrap {
    display: flex;
    height: 600px;
    border: 0.5px solid var(--border);
    overflow: hidden;
    background: var(--bg);
  }

  .left-panel {
    width: 100%;
    transition: width 0.35s cubic-bezier(0.4,0,0.2,1);
    border-right: 0.5px solid var(--border);
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  .left-panel.collapsed { width: 38%; }

  .right-panel {
    width: 0;
    overflow: hidden;
    transition: width 0.35s cubic-bezier(0.4,0,0.2,1);
    background: var(--bg);
  }

  .right-panel.open { width: 62%; }

  .search-wrap {
    padding: 14px 16px;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg);
  }

  .search-wrap input {
    width: 100%;
    padding: 8px 10px;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 12px;
    letter-spacing: 0.05em;
    background: var(--bg-light);
    border: 0.5px solid var(--border);
    color: var(--text);
    outline: none;
  }

  .search-wrap input::placeholder { color: var(--border); }

  .filters {
    padding: 10px 16px;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    background: var(--bg);
  }

  .filter-btn {
    padding: 3px 10px;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: transparent;
    border: 0.5px solid var(--border);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--text-muted); color: var(--text); }
  .filter-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  .cocktail-list {
    overflow-y: auto;
    flex: 1;
  }

  .cocktail-list::-webkit-scrollbar { width: 3px; }
  .cocktail-list::-webkit-scrollbar-track { background: var(--bg); }
  .cocktail-list::-webkit-scrollbar-thumb { background: var(--border); }

  .cocktail-item {
    padding: 13px 16px;
    border-bottom: 0.5px solid var(--border);
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: background 0.1s;
  }

  .cocktail-item:hover { background: var(--bg-light); }

  .cocktail-item.active {
    background: var(--text);
  }

  .cocktail-item.active .c-name { color: var(--bg); }
  .cocktail-item.active .c-spirit { color: var(--border); }

  .c-name {
    font-family: 'EB Garamond', serif;
    font-size: 16px;
    color: var(--text);
  }

  .c-spirit {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .no-results {
    padding: 24px 16px;
    font-style: italic;
    color: var(--text-muted);
    font-size: 14px;
  }

  .recipe-card {
    padding: 32px 36px;
    height: 100%;
    overflow-y: auto;
  }

  .recipe-card::-webkit-scrollbar { width: 3px; }
  .recipe-card::-webkit-scrollbar-track { background: var(--bg); }
  .recipe-card::-webkit-scrollbar-thumb { background: var(--border); }

  .recipe-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 2px;
  }

  .recipe-title {
    font-family: 'EB Garamond', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--text);
    line-height: 1.2;
  }

  .close-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 22px;
    font-family: 'EB Garamond', serif;
    padding: 0 0 0 12px;
    line-height: 1;
    transition: color 0.15s;
  }

  .close-btn:hover { color: var(--text); }

  .recipe-spirit-tag {
    display: block;
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 24px;
  }

  .section-label {
    font-family: 'Helvetica Neue', sans-serif;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .ingredient-list {
    list-style: none;
    margin-bottom: 4px;
  }

  .ingredient-list li {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    border-bottom: 0.5px solid var(--bg-light);
    font-size: 15px;
    color: var(--text);
  }

  .ingredient-list li span {
    font-style: italic;
    color: var(--text-muted);
    font-size: 14px;
  }

  .divider {
    height: 0.5px;
    background: var(--border);
    margin: 22px 0;
  }

  .method-text {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.75;
  }

  .source-text {
    font-size: 13px;
    color: var(--text-muted);
    font-style: italic;
  }

  .fact-box {
    border-left: 2px solid var(--accent);
    padding: 10px 14px;
    margin-top: 10px;
    background: var(--bg-light);
  }

  .fact-box p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.7;
    font-style: italic;
  }

  .empty-state {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-style: italic;
    color: var(--border);
    font-size: 15px;
    text-align: center;
    padding: 40px;
  }
</style>
</head>
<body>

<div class="bible-wrap" id="bible">
  <div class="left-panel" id="left">
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Search classics..." oninput="render()">
    </div>
    <div class="filters" id="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('whisky',this)">Whisky</button>
      <button class="filter-btn" onclick="setFilter('gin',this)">Gin</button>
      <button class="filter-btn" onclick="setFilter('rum',this)">Rum</button>
      <button class="filter-btn" onclick="setFilter('vodka',this)">Vodka</button>
      <button class="filter-btn" onclick="setFilter('tequila',this)">Tequila</button>
      <button class="filter-btn" onclick="setFilter('non-alcoholic',this)">Non-Alcoholic</button>
    </div>
    <div class="cocktail-list" id="list"></div>
  </div>
  <div class="right-panel" id="right">
    <div class="recipe-card" id="card">
      <div class="empty-state">Select a cocktail to view the recipe</div>
    </div>
  </div>
</div>

<script>
const cocktails = [
{
    name: "Manhattan",
    spirit: "whisky",
    ingredients: [["Rittenhouse Rye","75ml"],["Asterley Bros Estate English Vermouth","15ml"],["Angostura bitters","2 dashes"],["Orange coin","to garnish"]],
    method: "Stir all ingredients over ice until well chilled. Strain into a coupe. Garnish with an orange coin.",
    fact: ""
  },
  {
    name: "Mai Tai",
    spirit: "rum",
    ingredients: [["El Dorado 15 Year Rum","30ml"],["Diplomatico Reserva Exclusiva","30ml"],["Brugal Añejo","10ml"],["Fresh lime juice","30ml"],["Orgeat","15ml"],["Combier L'Original Triple Sec","7.5ml"],["Angostura bitters","1 dash"],["Lime wedge","to squeeze"]],
    method: "Squeeze a lime wedge into a shaker and drop it in. Add the remaining ingredients and short shake with three ice cubes. Strain into a snifter filled with crushed ice. Garnish with a mint bouquet and serve with a straw.",
    fact: ""
  },
  {
    name: "Mojito",
    spirit: "rum",
    ingredients: [["Planteray Rum Three Stars","60ml"],["Fresh lime juice","30ml"],["Demerara sugar","1 cube"],["Mint leaves","6"],["Angostura bitters","2 drops"]],
    method: "Gently muddle the mint and sugar in a shaker. Add the remaining ingredients and whip shake with a few pieces of crushed ice until just incorporated. Dump into a double rocks glass and fill with crushed ice. Garnish with a mint bouquet and serve with a straw.",
    fact: ""
  },
  {
    name: "Paloma",
    spirit: "tequila",
    ingredients: [["Mijenta Cristalino Tequila","60ml"],["Fresh grapefruit juice","15ml"],["Simple syrup","15ml"],["San Pellegrino Pompelmo","to top"],["Kosher salt","for rim"],["Half lime","to squeeze"]],
    method: "Rim a highball glass with kosher salt. Squeeze the lime half into a shaker and drop it in. Add the tequila, grapefruit juice and simple syrup and short shake with three ice cubes. Strain into the glass over fresh ice and top with grapefruit soda. Garnish with a lime wheel and serve with a straw.",
    fact: ""
  },
  {
    name: "Sazerac",
    spirit: "whisky",
    ingredients: [["Rittenhouse Rye","45ml"],["Rémy Martin VSOP","15ml"],["Demerara syrup","5ml"],["Peychaud's bitters","4 dashes"],["Angostura bitters","1 dash"],["Absinthe","to rinse"],["Lemon twist","to finish"]],
    method: "Rinse a rocks glass with absinthe and discard. Stir all remaining ingredients over ice until well chilled. Strain into the prepared glass. Squeeze a lemon twist over the drink and discard. No garnish.",
    fact: ""
  },
  {
    name: "Boulevardier",
    spirit: "whisky",
    ingredients: [["Makers Mark 46","45ml"],["Asterley Bros Estate English Vermouth","20ml"],["Campari","20ml"],["Lemon twist","to garnish"]],
    method: "Stir all ingredients over ice until well chilled. Strain into a coupe. Garnish with a lemon twist.",
    fact: ""
  },
  {
    name: "French 75",
    spirit: "gin",
    ingredients: [["Tanqueray 10","45ml"],["Fresh lemon juice","20ml"],["Simple syrup","15ml"],["Dry Champagne","to top"],["Lemon twist","to garnish"]],
    method: "Shake the gin, lemon juice and sugar syrup with ice. Double strain into a chilled flute. Top with champagne and garnish with a lemon twist.",
    fact: ""
  },
  {
    name: "Dark and Stormy",
    spirit: "rum",
    ingredients: [["Gosling's Black Seal Rum","60ml"],["Fresh lime juice","20ml"],["Angostura bitters","1 dash"],["Ginger Beer","to top"],["Lime wedge","to garnish"]],
    method: "Combine the rum, lime juice and bitters in a shaker and whip shake with a few pieces of crushed ice until just incorporated. Strain into a highball glass over fresh ice. Top with ginger beer. Garnish with a lime wedge and serve with a straw.",
    fact: ""
  },
  {
    name: "Vesper",
    spirit: "gin",
    ingredients: [["Tanqueray 10","45ml"],["X-Muse Vodka","20ml"],["Cocchi Americano","15ml"],["Lemon twist","to garnish"]],
    method: "Stir all ingredients over ice until well chilled. Strain into a Nick and Nora glass. Garnish with a lemon twist.",
    fact: ""
  },
  
];

let activeFilter = 'all';
let activeIndex = null;

function setFilter(spirit, btn) {
  activeFilter = spirit;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeIndex = null;
  closeCard();
  render();
}

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const list = document.getElementById('list');
  list.innerHTML = '';
  const filtered = cocktails.filter((c, i) => {
    if (activeFilter !== 'all' && c.spirit !== activeFilter) return false;
    if (search && !c.name.toLowerCase().includes(search)) return false;
    return true;
  });
  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-results">No classics found.</div>';
    return;
  }
  filtered.forEach(c => {
    const originalIndex = cocktails.indexOf(c);
    const item = document.createElement('div');
    item.className = 'cocktail-item' + (activeIndex === originalIndex ? ' active' : '');
    item.innerHTML = `<span class="c-name">${c.name}</span><span class="c-spirit">${c.spirit}</span>`;
    item.onclick = () => selectCocktail(originalIndex, item);
    list.appendChild(item);
  });
}

function selectCocktail(index, el) {
  activeIndex = index;
  document.querySelectorAll('.cocktail-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('left').classList.add('collapsed');
  document.getElementById('right').classList.add('open');
  const c = cocktails[index];
  document.getElementById('card').innerHTML = `
    <div class="recipe-header">
      <h1 class="recipe-title">${c.name}</h1>
      <button class="close-btn" onclick="closeCard()" aria-label="Close recipe">×</button>
    </div>
    <span class="recipe-spirit-tag">${c.spirit}</span>
    <div class="section-label">Ingredients</div>
    <ul class="ingredient-list">
      ${c.ingredients.map(([n,a]) => `<li>${n}<span>${a}</span></li>`).join('')}
    </ul>
    <div class="divider"></div>
    <div class="section-label">Method</div>
    <p class="method-text">${c.method}</p>
    <div class="divider"></div>
    ${c.fact ? `
    <div class="divider"></div>
    <div class="section-label">Note</div>
    <div class="fact-box"><p>${c.fact}</p></div>` : ''}
  `;
}

function closeCard() {
  activeIndex = null;
  document.getElementById('left').classList.remove('collapsed');
  document.getElementById('right').classList.remove('open');
  document.getElementById('card').innerHTML = '<div class="empty-state">Select a cocktail to view the recipe</div>';
  document.querySelectorAll('.cocktail-item').forEach(i => i.classList.remove('active'));
}

render();
</script>
</body>
</html>
